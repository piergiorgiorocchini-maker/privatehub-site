<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Accesso Diretto</title>
    <meta name="description" content="Portale di accesso diretto non indicizzato." />
    <link rel="stylesheet" href="../../assets/css/base.css" />
  </head>

  <body>
    <main class="container">
      <h1>Accesso diretto</h1>
      <p>Punto di accesso non indicizzato. Connessione immediata.</p>

      <div class="consent-box">
        <label>
          <input type="checkbox" id="consentCheck" />
          Confermo di avere almeno 18 anni e di accettare i
          <a href="/policies/terms.html" target="_blank" rel="noopener">Termini e Condizioni</a>
          e la
          <a href="/policies/privacy.html" target="_blank" rel="noopener">Privacy Policy</a>.
        </label>
      </div>

      <a id="enterBtn" class="cta discreet disabled">
        Continua
      </a>

      <p class="micro">Questa pagina non è elencata pubblicamente.</p>

      <footer class="legal">
        <a href="/policies/privacy.html">Privacy Policy</a>
        <a href="/policies/terms.html">Termini e Condizioni</a>
        <a href="/policies/cookies.html">Cookie Policy</a>
        <br />
        <span>© 2026 PrivateHub · privacy@privatehub.io</span>
      </footer>
    </main>

    <script>
      const check = document.getElementById("consentCheck");
      const btn = document.getElementById("enterBtn");

      check.addEventListener("change", function () {
        if (check.checked) {
          btn.classList.remove("disabled");
          btn.href =
            "https://track.privatehub.io/click?campaign=it-c&source=direct";
        } else {
          btn.classList.add("disabled");
          btn.removeAttribute("href");
        }
      });
    </script>
  </body>
</html>
