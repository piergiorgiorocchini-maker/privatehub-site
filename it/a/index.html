<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Accesso Privato</title>
    <meta name="description" content="Portale di accesso privato." />
    <link rel="stylesheet" href="../../assets/css/base.css?v=2" />
  </head>

  <body>
    <main class="container">
      <h1>Accesso Live Riservato</h1>
      <p>Sessioni live attualmente attive.</p>

      <div class="consent-box">
        <label>
          <input type="checkbox" id="consentCheck" />
          Confermo di avere almeno 18 anni e di accettare i
          <a href="/policies/terms.html" target="_blank">Termini e Condizioni</a>
          e la
          <a href="/policies/privacy.html" target="_blank">Privacy Policy</a>.
        </label>
      </div>

      <a id="enterBtn" class="cta disabled">
        Entra nella live
      </a>

      <p class="micro">
        Disponibilità limitata. L’accesso può essere chiuso in qualsiasi momento.
      </p>

      <footer class="legal">
        <a href="/policies/privacy.html">Privacy Policy</a>
        <a href="/policies/terms.html">Termini e Condizioni</a>
        <a href="/policies/cookies.html">Cookie Policy</a>
        <br />
        <span>© 2026 PrivateHub · privacy@privatehub.io</span>
      </footer>
    </main>

    <script>
      const check = document.getElementById("consentCheck");
      const btn = document.getElementById("enterBtn");

      check.addEventListener("change", function () {
        if (check.checked) {
          btn.classList.remove("disabled");
          btn.href =
            "https://track.privatehub.io/click?campaign=it-a&source=direct";
        } else {
          btn.classList.add("disabled");
          btn.removeAttribute("href");
        }
      });
    </script>
  </body>
</html>
